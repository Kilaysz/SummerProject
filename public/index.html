<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Form</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/boxicons@2.1.4/dist/boxicons.js"></script>
</head>
<body>
    <div class="wrapper">
        <form id="loginForm">
            <h1>Login Page</h1>
            <div class="input-box">
                <input type="text" id="username" placeholder="Username" required>
                <box-icon name="user" color="white"></box-icon>
            </div>
            <div class="input-box">
                <input type="password" id="password" placeholder="Password" required>
                <box-icon name="lock-alt" color="white"></box-icon>
            </div>
            <div class="remember-forgot">
                <label><input type="checkbox">Remember Me</label>
                <a href="#">Forgot Password</a>
            </div>
            <button type="submit" class="btn">Login</button>
            <div class="register-link">
                <p>Don't have an account?<a href="#">Register</a></p>
            </div>
        </form>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js";
        import { getFirestore, collection, query, where, getDocs, doc, setDoc} from "https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore.js";        
        
        // Your Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyCMsPc78nGznJfVuKqnLB4lKLJ_avyZKoU",
            authDomain: "login-server-336ad.firebaseapp.com",
            projectId: "login-server-336ad",
            storageBucket: "login-server-336ad.appspot.com",
            messagingSenderId: "677197955097",
            appId: "1:677197955097:web:f41e30524f1a8cb6cfea88",
            measurementId: "G-DKFVCYJJK5"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Function to check username and password
        async function checkUserCredentials(username, password) {
            try {
                // Create a reference to the users collection
                const usersRef = collection(db, "users");

                // Create a query to find the user by username
                const q = query(usersRef, where("username", "==", username));

                // Execute the query
                const querySnapshot = await getDocs(q);

                // Check if the user exists and if the password matches
                if (!querySnapshot.empty) {
                    // Assuming the username is unique, we should have only one document
                    const doc = querySnapshot.docs[0];
                    const userData = doc.data();

                    if (userData.password === password) {
                        console.log("Login successful");
                        // Proceed with the user login
                        // For example, redirect to another page
                    } else {
                        console.log("Invalid password");
                        alert("Invalid password. Please try again.");
                    }
                } else {
                    console.log("User not found");
                    alert("User not found. Please check your username.");
                }
            } catch (error) {
                console.error("Error checking user credentials:", error);
                alert("An error occurred. Please try again.");
            }
        }


        // Set user data in Firestore
        async function setUserData(username, password) {
            try {
                // Reference to the document
                const userRef = doc(db, "users", username);

                // Set the document data with specified fields
                await setDoc(userRef, {
                    username: username,
                    password: password
                });

                console.log("User data set successfully");
            } catch (error) {
                console.error("Error setting user data:", error);
            }
        }

        setUserData("Erik", "1234");

        // Add event listener to the form
        document.getElementById('loginForm').addEventListener('submit', function(event) {
            event.preventDefault(); // Prevent form submission

            // Get the values from the form inputs
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            // Check user credentials
            checkUserCredentials(username, password);
        });
    </script>
</body>
</html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Form</title>
    <link rel = "stylesheet" href="styles.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/boxicons@2.1.4/dist/boxicons.js"></script>
</head>
<body>
    <div class = "wrapper">
        <form id="loginForm">
            <h1>Login Page</h1>
            <div class="input-box">
                <input type="text" placeholder="Username" required>
                <box-icon name='user' color = "white"></box-icon>
            </div>
            <div class="input-box">
                <input type="password" placeholder="Password" required>
                <box-icon name='lock-alt' color = "white" ></box-icon>
            </div>
            <div class="remember-forgot">
                <label><input type="checkbox">Remember Me</label>
                <a href="#">Forgot Password</a>
            </div>
            <button type="submit" class = "btn">Login</button>
            <div class="register-link">
                <p>Don't have an account?<a href="#">Register</a></p>
            </div>
        </form>
    </div>

    
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database.js"></script>


    <script type="module">
        // Import the functions you need from the SDKs you need
        // Import the functions you need from the SDKs you need
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore.js";
        // TODO: Add SDKs for Firebase products that you want to use
        // https://firebase.google.com/docs/web/setup#available-libraries
      
        // Your web app's Firebase configuration
        // For Firebase JS SDK v7.20.0 and later, measurementId is optional
        const firebaseConfig = {
          apiKey: "AIzaSyCMsPc78nGznJfVuKqnLB4lKLJ_avyZKoU",
          authDomain: "login-server-336ad.firebaseapp.com",
          projectId: "login-server-336ad",
          storageBucket: "login-server-336ad.appspot.com",
          messagingSenderId: "677197955097",
          appId: "1:677197955097:web:f41e30524f1a8cb6cfea88",
          measurementId: "G-DKFVCYJJK5"
        };
      
        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const analytics = getAnalytics(app);

        // Initialize Firestore
        const db = getFirestore(app);

        // Reference to the login form
        const loginForm = document.getElementById('loginForm');

        // Attach an event listener to the form
        loginForm.addEventListener('submit', function(event) {
            event.preventDefault(); // Prevent form from submitting normally

            const username = document.getElementById('Username').value;
            const password = document.getElementById('Password').value;

            // Perform login logic here
            login(username, password);
        });

        // Login function
        async function login(username, password) {
            try {
                const userDoc = await db.collection('users').doc(username).get();

                if (userDoc.exists) {
                    const userData = userDoc.data();
                    if (userData.password === password) {
                        alert('Login successful');
                    } else {
                        alert('Incorrect password');
                    }
                } else {
                    alert('User does not exist');
                }
            } catch (error) {
                console.error('Error logging in:', error);
                alert('Error logging in. Please try again.');
            }
        }
      </script>
</body>
</html>
